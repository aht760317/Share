<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>顧德補習班 - 分潤管理後台</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        
        /* 登入畫面專屬樣式 */
        #loginScreen {
            max-width: 400px; margin: 100px auto; background: white;
            padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }
        #loginScreen h2 { color: #1a365d; margin-top: 0; margin-bottom: 20px; }
        #loginScreen input {
            width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #cbd5e0;
            border-radius: 5px; box-sizing: border-box; font-size: 16px; text-align: center;
        }
        #loginScreen button { width: 100%; background-color: #2c3e50; }
        #loginScreen button:hover { background-color: #1a252f; }
        .error-msg { color: #e53e3e; font-size: 14px; margin-top: 10px; display: none; font-weight: bold;}

        /* 主系統樣式 */
        #mainApp { max-width: 1000px; margin: 0 auto; } /* 加寬一點點容納新欄位 */
        .header-title { text-align: center; color: #1a365d; margin-bottom: 20px; }
        
        .panel {
            background: white; padding: 25px; border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 25px;
        }
        .panel h3 { margin-top: 0; color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; color: #4a5568; }
        .form-group input, .form-group select {
            width: 100%; padding: 10px; border: 1px solid #cbd5e0;
            border-radius: 5px; box-sizing: border-box; font-size: 15px;
        }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        button {
            background-color: #3182ce; color: white; border: none; padding: 10px 20px;
            font-size: 16px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s;
        }
        button:hover { background-color: #2b6cb0; }
        .btn-green { background-color: #38a169; width: 100%; margin-top: 10px; padding: 12px;}
        .btn-green:hover { background-color: #2f855a; }
        .btn-red { background-color: #e53e3e; }
        .btn-red:hover { background-color: #c53030; }

        /* 小按鈕樣式 */
        .btn-small {
            color: white; border: none; padding: 6px 10px;
            border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: normal; margin-right: 5px;
        }
        .btn-small.delete { background-color: #fc8181; }
        .btn-small.delete:hover { background-color: #e53e3e; }
        .btn-small.pay { background-color: #4299e1; }
        .btn-small.pay:hover { background-color: #3182ce; }
        .btn-small.undo { background-color: #a0aec0; }
        .btn-small.undo:hover { background-color: #718096; }

        /* 查詢結果卡片 (改成3格) */
        .summary-cards { display: none; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .card { padding: 15px; border-radius: 8px; color: white; text-align: center; }
        .card-blue { background: #2c3e50; }
        .card-green { background: #38a169; }
        .card-orange { background: #dd6b20; }
        .card h4 { margin: 0 0 10px 0; opacity: 0.9; font-size: 1.1em;}
        .card .amount { font-size: 1.8em; font-weight: bold; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; vertical-align: middle; }
        th { background-color: #f8f9fa; color: #4a5568; }
        .badge { padding: 4px 8px; border-radius: 12px; font-size: 0.85em; color: white; }
        .rate-10 { background: #38a169; }
        .rate-6 { background: #d69e2e; }
        .rate-4 { background: #805ad5; }
        .status-paid { color: #38a169; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        .status-unpaid { color: #dd6b20; font-weight: bold; }
        .money { font-weight: bold; color: #e53e3e; }
        .money-paid { color: #a0aec0; text-decoration: line-through; } /* 已付清的錢變灰色 */
    </style>
</head>
<body>

<div id="loginScreen">
    <h2>🔒 顧德系統登入</h2>
    <p style="color: #718096; margin-bottom: 20px; font-size: 14px;">此為行政人員專用後台，請輸入通行密碼。</p>
    <input type="password" id="sysPassword" placeholder="請輸入密碼..." onkeypress="handleEnter(event)">
    <button onclick="checkPassword()">登入系統</button>
    <div id="errorMsg" class="error-msg">❌ 密碼錯誤，請重新輸入！</div>
</div>

<div id="mainApp" style="display: none;">
    <h2 class="header-title">🏫 顧德補習班 - 分潤管理系統</h2>

    <div class="panel" style="border-left: 5px solid #38a169;">
        <h3>➕ 第一步：建立推薦人家長檔案</h3>
        <div class="grid-2">
            <div class="form-group">
                <label>家長姓名 (或編號)：</label>
                <input type="text" id="newParentName" placeholder="例如：陳媽媽 (林小華家長)">
            </div>
            <div class="form-group">
                <label>&nbsp;</label>
                <button onclick="addParent()">新增家長檔案</button>
            </div>
        </div>
    </div>

    <div class="panel" style="border-left: 5px solid #3182ce;">
        <h3>📝 第二步：登錄新生繳費資料 (綁定推薦人)</h3>
        <div class="form-group">
            <label>這名新生是誰推薦的？ (請先選家長)</label>
            <select id="selectParentForStudent">
                <option value="">請選擇家長...</option>
            </select>
        </div>
        <div class="grid-2">
            <div class="form-group">
                <label>新生姓名：</label>
                <input type="text" id="newStudentName" placeholder="例如：王大明">
            </div>
            <div class="form-group">
                <label>首次報名日期：</label>
                <input type="date" id="newEnrollDate">
            </div>
        </div>
        <div class="form-group">
            <label>本次繳納學費 (NT$)：</label>
            <input type="number" id="newTuition" placeholder="例如：30000">
        </div>
        <button class="btn-green" onclick="addStudent()">儲存繳費紀錄並計算分潤</button>
    </div>

    <div class="panel" style="border-left: 5px solid #dd6b20;">
        <h3>🔍 第三步：查詢、帳務狀態與結算</h3>
        <div class="form-group" style="display: flex; gap: 10px; align-items: flex-end;">
            <div style="flex-grow: 1;">
                <label>選擇要查詢的家長：</label>
                <select id="queryParentSelect" onchange="searchParent()">
                    <option value="">請選擇要查詢的家長...</option>
                </select>
            </div>
            <button id="deleteParentBtn" class="btn-red" style="display: none; height: 42px;" onclick="deleteParent()">🗑️ 刪除此家長</button>
        </div>

        <div class="summary-cards" id="summarySection">
            <div class="card card-blue">
                <h4>💰 累積產生獎金</h4>
                <div class="amount" id="totalCommission">NT$ 0</div>
            </div>
            <div class="card card-green">
                <h4>✅ 已結算發放</h4>
                <div class="amount" id="paidCommission">NT$ 0</div>
            </div>
            <div class="card card-orange">
                <h4>⚠️ 尚未發放</h4>
                <div class="amount" id="unpaidCommission">NT$ 0</div>
            </div>
        </div>

        <div id="detailSection" style="display: none;">
            <table>
                <thead>
                    <tr>
                        <th>學生姓名</th>
                        <th>入學日期</th>
                        <th>繳交學費</th>
                        <th>分潤比例</th>
                        <th>應發獎金</th>
                        <th>目前狀態</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="studentListBody">
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // ================= 1. 登入系統邏輯 =================
    const SYSTEM_PASSWORD = "gude888"; 

    function handleEnter(event) {
        if (event.key === "Enter") {
            checkPassword();
        }
    }

    function checkPassword() {
        try {
            const inputElement = document.getElementById('sysPassword');
            const inputPwd = inputElement.value.trim();
            const errorMsg = document.getElementById('errorMsg');
            
            if (inputPwd === SYSTEM_PASSWORD) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
                sessionStorage.setItem('gudeLoggedIn', 'true');
                updateParentSelects();
            } else {
                errorMsg.style.display = 'block';
                inputElement.value = '';
                inputElement.focus();
            }
        } catch (e) {
            console.error("登入發生錯誤：", e);
        }
    }

    window.onload = function() {
        if (sessionStorage.getItem('gudeLoggedIn') === 'true') {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            updateParentSelects();
        }
    };

    // ================= 2. 後台資料庫與計算邏輯 =================
    let database = {};
    try {
        const savedData = localStorage.getItem('gudeDatabase');
        if (savedData) {
            database = JSON.parse(savedData);
        }
    } catch (e) {
        console.error("讀取資料庫失敗：", e);
    }

    function addParent() {
        const nameInput = document.getElementById('newParentName');
        const name = nameInput.value.trim();
        if(!name) { alert('請輸入家長姓名！'); return; }
        if(database[name]) { alert('這位家長已經在系統裡囉！'); return; }

        database[name] = { referrals: [] };
        saveDatabase();
        alert('✅ 家長檔案建立成功！');
        nameInput.value = ''; 
        updateParentSelects(); 
    }

    function updateParentSelects() {
        const select1 = document.getElementById('selectParentForStudent');
        const select2 = document.getElementById('queryParentSelect');
        
        select1.innerHTML = '<option value="">請選擇家長...</option>';
        select2.innerHTML = '<option value="">請選擇要查詢的家長...</option>';

        for(let parentName in database) {
            select1.innerHTML += `<option value="${parentName}">${parentName}</option>`;
            select2.innerHTML += `<option value="${parentName}">${parentName}</option>`;
        }
    }

    function addStudent() {
        const parentName = document.getElementById('selectParentForStudent').value;
        const studentName = document.getElementById('newStudentName').value.trim();
        const enrollDate = document.getElementById('newEnrollDate').value;
        const tuition = document.getElementById('newTuition').value;

        if(!parentName || !studentName || !enrollDate || !tuition) {
            alert('請把家長、學生姓名、日期和學費都填寫完整喔！'); return;
        }

        // 新增欄位：isPaid (預設為 false 尚未付款)
        database[parentName].referrals.push({
            studentName: studentName,
            enrollDate: enrollDate,
            tuitionPaid: parseInt(tuition),
            isPaid: false 
        });

        saveDatabase();
        alert('✅ 學生繳費資料登錄成功！');
        
        document.getElementById('newStudentName').value = '';
        document.getElementById('newTuition').value = '';
        
        if(document.getElementById('queryParentSelect').value === parentName) {
            searchParent();
        }
    }

    function calculateCommission(enrollDateString, tuitionAmount) {
        const today = new Date(); 
        const enrollDate = new Date(enrollDateString); 
        const diffTime = Math.abs(today - enrollDate);
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        const yearsEnrolled = diffDays / 365;

        let rate = 0; let badgeClass = ""; let rateText = "";

        if (yearsEnrolled <= 1) {
            rate = 0.10; badgeClass = "rate-10"; rateText = "1年內 (10%)";
        } else if (yearsEnrolled <= 2) {
            rate = 0.06; badgeClass = "rate-6"; rateText = "1~2年 (6%)";
        } else {
            rate = 0.04; badgeClass = "rate-4"; rateText = "2年以上 (4%)";
        }
        return { rateText: rateText, badgeClass: badgeClass, amount: Math.floor(tuitionAmount * rate) };
    }

    function searchParent() {
        const parentName = document.getElementById('queryParentSelect').value;
        const tbody = document.getElementById('studentListBody');
        const deleteBtn = document.getElementById('deleteParentBtn');
        
        if (!parentName) {
            document.getElementById('summarySection').style.display = "none";
            document.getElementById('detailSection').style.display = "none";
            deleteBtn.style.display = "none";
            return;
        }

        deleteBtn.style.display = "block";
        const parentData = database[parentName];
        tbody.innerHTML = ""; 
        
        let totalMoney = 0;
        let paidMoney = 0;
        let unpaidMoney = 0;

        parentData.referrals.forEach((student, index) => {
            const commission = calculateCommission(student.enrollDate, student.tuitionPaid);
            totalMoney += commission.amount; 

            // 為了相容你之前輸入的舊資料，如果沒有 isPaid 屬性，就當作沒付過
            const isPaid = student.isPaid || false; 

            if (isPaid) {
                paidMoney += commission.amount;
            } else {
                unpaidMoney += commission.amount;
            }

            // 決定畫面的呈現方式
            const moneyClass = isPaid ? 'money money-paid' : 'money';
            const statusHtml = isPaid 
                ? '<span class="status-paid">✅ 已發放</span>' 
                : '<span class="status-unpaid">⚠️ 未發放</span>';
            
            const actionBtnHtml = isPaid
                ? `<button class="btn-small undo" onclick="togglePayment('${parentName}', ${index})">↻ 復原狀態</button>`
                : `<button class="btn-small pay" onclick="togglePayment('${parentName}', ${index})">💰 標記已發放</button>`;

            tbody.innerHTML += `<tr>
                <td>${student.studentName}</td>
                <td>${student.enrollDate}</td>
                <td>NT$ ${student.tuitionPaid.toLocaleString()}</td>
                <td><span class="badge ${commission.badgeClass}">${commission.rateText}</span></td>
                <td class="${moneyClass}">NT$ ${commission.amount.toLocaleString()}</td>
                <td>${statusHtml}</td>
                <td>
                    ${actionBtnHtml}
                    <button class="btn-small delete" onclick="deleteStudent('${parentName}', ${index})">刪除</button>
                </td>
            </tr>`;
        });

        // 更新上方的 3 張會計卡片
        document.getElementById('totalCommission').innerText = "NT$ " + totalMoney.toLocaleString();
        document.getElementById('paidCommission').innerText = "NT$ " + paidMoney.toLocaleString();
        document.getElementById('unpaidCommission').innerText = "NT$ " + unpaidMoney.toLocaleString();
        
        document.getElementById('summarySection').style.display = "grid";
        document.getElementById('detailSection').style.display = "block";
    }

    // ================= 3. 新增：切換付款狀態功能 =================
    function togglePayment(parentName, studentIndex) {
        // 把原本的狀態「反轉」(True變False, False變True)
        const currentStatus = database[parentName].referrals[studentIndex].isPaid || false;
        database[parentName].referrals[studentIndex].isPaid = !currentStatus;
        
        saveDatabase();
        searchParent(); // 重新整理表格
    }

    function deleteStudent(parentName, studentIndex) {
        if (confirm("確定要刪除這筆繳費紀錄嗎？\n(刪除後獎金會自動重新計算)")) {
            database[parentName].referrals.splice(studentIndex, 1);
            saveDatabase();
            searchParent();
        }
    }

    function deleteParent() {
        const parentName = document.getElementById('queryParentSelect').value;
        if (confirm(`⚠️ 警告：確定要刪除【${parentName}】嗎？\n這會把該名家長以及他底下介紹的所有學生紀錄都一併刪除，無法復原喔！`)) {
            delete database[parentName];
            saveDatabase();
            alert(`已成功刪除 ${parentName} 的所有資料。`);
            updateParentSelects();
            document.getElementById('queryParentSelect').value = "";
            searchParent(); 
        }
    }

    function saveDatabase() {
        localStorage.setItem('gudeDatabase', JSON.stringify(database));
    }
</script>

</body>
</html>
