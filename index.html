<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>顧德補習班 - 家長分潤查詢後台</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h2 { color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-top: 0;}
        
        /* 查詢區塊 */
        .search-box {
            background: #e8f4f8;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        select {
            padding: 10px;
            font-size: 16px;
            border-radius: 5px;
            border: 1px solid #ccc;
            flex-grow: 1;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #2980b9; }

        /* 總結卡片區塊 */
        .summary-cards {
            display: none; /* 一開始先隱藏 */
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .card {
            padding: 20px;
            border-radius: 8px;
            color: white;
            text-align: center;
        }
        .card-blue { background: #34495e; }
        .card-orange { background: #e67e22; }
        .card h3 { margin: 0 0 10px 0; font-size: 1.2em; opacity: 0.9; }
        .card .amount { font-size: 2.5em; font-weight: bold; }

        /* 學生明細清單 */
        .detail-section { display: none; } /* 一開始先隱藏 */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            background: #fff;
        }
        th, td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
            text-align: left;
        }
        th { background-color: #f8f9fa; color: #2c3e50; font-weight: bold; }
        tr:hover { background-color: #f5f5f5; }
        .badge {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.85em;
            color: white;
        }
        .badge.rate-10 { background: #2ecc71; }
        .badge.rate-6 { background: #f39c12; }
        .badge.rate-4 { background: #9b59b6; }
        .money { font-weight: bold; color: #e74c3c; }
    </style>
</head>
<body>

<div class="container">
    <h2>🏫 顧德補習班 - 分潤查詢總表</h2>
    
    <div class="search-box">
        <label for="parentSelect"><strong>查詢家長：</strong></label>
        <select id="parentSelect">
            <option value="">請選擇要查詢的家長...</option>
            <option value="P001">陳媽媽 (林小華的家長)</option>
            <option value="P002">黃爸爸 (黃小虎的家長)</option>
        </select>
        <button onclick="searchParent()">查詢明細</button>
    </div>

    <div class="summary-cards" id="summarySection">
        <div class="card card-blue">
            <h3>👥 累積推薦學生數</h3>
            <div class="amount" id="totalStudents">0 人</div>
        </div>
        <div class="card card-orange">
            <h3>💰 本期應發放總分潤</h3>
            <div class="amount" id="totalCommission">NT$ 0</div>
        </div>
    </div>

    <div class="detail-section" id="detailSection">
        <h3>📄 推薦學生繳費明細 (系統自動計算年資 10% ➔ 6% ➔ 4%)</h3>
        <table>
            <thead>
                <tr>
                    <th>學生姓名</th>
                    <th>首次入學日</th>
                    <th>本次繳納學費</th>
                    <th>適用分潤比例</th>
                    <th>產生獎金</th>
                </tr>
            </thead>
            <tbody id="studentListBody">
                </tbody>
        </table>
    </div>

</div>

<script>
    // 這裡是我們的「模擬資料庫」。
    // 實務上，這些資料未來會從你的 Google 試算表裡面抓出來。
    const database = {
        "P001": {
            name: "陳媽媽",
            referrals: [
                { studentName: "王大明", enrollDate: "2025-08-01", tuitionPaid: 30000 }, // 不滿1年 (10%)
                { studentName: "李小美", enrollDate: "2024-02-15", tuitionPaid: 28000 }, // 1~2年 (6%)
                { studentName: "張建國", enrollDate: "2022-09-01", tuitionPaid: 30000 }  // 超過2年 (4%)
            ]
        },
        "P002": {
            name: "黃爸爸",
            referrals: [
                { studentName: "趙宇軒", enrollDate: "2026-01-20", tuitionPaid: 32000 }, // 不滿1年 (10%)
                { studentName: "周杰倫", enrollDate: "2026-03-01", tuitionPaid: 32000 }  // 不滿1年 (10%)
            ]
        }
    };

    // 計算分潤的邏輯 (你設定的 10%, 6%, 4%)
    function calculateCommission(enrollDateString, tuitionAmount) {
        const today = new Date(); 
        const enrollDate = new Date(enrollDateString); 
        const diffTime = Math.abs(today - enrollDate);
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        const yearsEnrolled = diffDays / 365;

        let rate = 0;
        let badgeClass = "";
        let rateText = "";

        if (yearsEnrolled <= 1) {
            rate = 0.10;
            badgeClass = "rate-10";
            rateText = "第一年 10%";
        } else if (yearsEnrolled <= 2) {
            rate = 0.06;
            badgeClass = "rate-6";
            rateText = "第二年 6%";
        } else {
            rate = 0.04;
            badgeClass = "rate-4";
            rateText = "第三年起 4%";
        }

        return {
            rateText: rateText,
            badgeClass: badgeClass,
            amount: Math.floor(tuitionAmount * rate)
        };
    }

    // 當按下查詢按鈕時執行的動作
    function searchParent() {
        const parentId = document.getElementById('parentSelect').value;
        
        if (!parentId) {
            alert("請先從下拉選單選擇一位家長喔！");
            return;
        }

        const parentData = database[parentId];
        const tbody = document.getElementById('studentListBody');
        tbody.innerHTML = ""; // 清空上一次的查詢紀錄
        
        let totalMoney = 0;

        // 跑迴圈，把這位家長介紹的每一個學生列出來
        parentData.referrals.forEach(student => {
            const commission = calculateCommission(student.enrollDate, student.tuitionPaid);
            totalMoney += commission.amount; // 累加總獎金

            // 產生表格的一列 (一筆資料)
            const row = `<tr>
                <td>${student.studentName}</td>
                <td>${student.enrollDate}</td>
                <td>NT$ ${student.tuitionPaid.toLocaleString()}</td>
                <td><span class="badge ${commission.badgeClass}">${commission.rateText}</span></td>
                <td class="money">NT$ ${commission.amount.toLocaleString()}</td>
            </tr>`;
            tbody.innerHTML += row;
        });

        // 更新上方的總結卡片
        document.getElementById('totalStudents').innerText = parentData.referrals.length + " 人";
        document.getElementById('totalCommission').innerText = "NT$ " + totalMoney.toLocaleString();

        // 顯示被隱藏的區塊
        document.getElementById('summarySection').style.display = "grid";
        document.getElementById('detailSection').style.display = "block";
    }
</script>

</body>
</html>
